# ── Общие настройки (одни на все прокси) ───────────────────────────
namespace: default
ingressClassName: nginx
tlsSecret:  sadkomed-tls        # один Secret с *.sadkomed.ru на всех

# Дефолты — применяются, если у прокси не указано своё значение
defaults:
  backendPort: 80
  sslRedirect: true                 # http -> https

# ── Прокси ─────────────────────────────────────────────────────────
# Списки прокси живут в values-файлах контроллеров (values-proxy-150.yaml и т.д.)
# Добавить прокси = дописать блок в файл нужного контроллера и запушить —
# ArgoCD применит сам. Руками helm upgrade НЕ делать.
proxies: []

# Внутренние сервисы кластера — тоже в values-файлах контроллеров
internal: []