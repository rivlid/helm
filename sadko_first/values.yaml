# ── Общие настройки (одни на все прокси) ───────────────────────────
namespace: default
ingressClassName: nginx
tlsSecret:  sadkomed-tls        # один Secret с *.sadkomed.ru на всех

# Дефолты — применяются, если у прокси не указано своё значение
defaults:
  backendPort: 80
  sslRedirect: true                 # http -> https

# ── Список прокси ──────────────────────────────────────────────────
# Каждый блок = один сайт. Это твой старый `server { }` из nginx.
# Минимум нужно: name, host, backendIP. Порт берётся из defaults.
