{{- range .Values.internal }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}-internal
  namespace: {{ $.Values.namespace }}
spec:
  type: ExternalName
  externalName: {{ .serviceName }}.{{ .serviceNamespace }}.svc.cluster.local
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .name }}-ingress
  namespace: {{ $.Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    {{- if .backendProtocol }}
    nginx.ingress.kubernetes.io/backend-protocol: {{ .backendProtocol | quote }}
    {{- end }}
spec:
  ingressClassName: {{ $.Values.ingressClassName }}
  tls:
  - hosts:
    - {{ .host }}
    secretName: {{ $.Values.tlsSecret }}
  rules:
  - host: {{ .host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .name }}-internal
            port:
              number: {{ .backendPort }}
{{- end }}