{{- range .Values.proxies }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .name }}-external
  namespace: {{ $.Values.namespace }}
spec:
  ports:
  - port: {{ .backendPort | default $.Values.defaults.backendPort }}
    protocol: TCP

---

apiVersion: v1
kind: Endpoints
metadata:
  name: {{ .name }}-external
  namespace: {{ $.Values.namespace }}
subsets:
  - addresses:
    - ip: {{ .backendIP }}
    ports:
    - port: {{ .backendPort | default $.Values.defaults.backendPort }}

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .name }}-ingress
  namespace: {{ $.Values.namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: {{ $.Values.ingressClassName }}
  tls:
  - hosts:
    - {{ .host }}
    secretName: {{ $.Values.tlsSecret }}
  rules:
  - host: {{ .host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .name }}-external
            port:
              number: {{ .backendPort | default $.Values.defaults.backendPort }}
{{- end }}